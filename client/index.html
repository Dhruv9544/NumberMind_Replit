<!DOCTYPE html>

  <head>
    <meta charset="UTF-8" />

    <!-- ═══════════════════════════════════════════════════════════ -->
    <!-- PRIMARY SEO META TAGS                                       -->
    <!-- ═══════════════════════════════════════════════════════════ -->
    <title>NumberMind – Multiplayer Code-Breaking Deduction Game</title>
    <meta name="description" content="NumberMind is a real-time deduction game where you pick a 4-digit secret number and guess your opponent's code. Challenge your logic skills and outsmart your rival – play free now!" />
    <meta name="keywords" content="number mind game, code breaking game, deduction puzzle, multiplayer logic game, mastermind online, brain game, secret number game, logic puzzle, code cracker" />
    <meta name="author" content="Dhruv Shah" />

    <meta name="twitter:title" content="NumberMind – Multiplayer Code-Cracking Game" />

    {
      "@context": "https://schema.org",
      "@type": "VideoGame",
      "name": "NumberMind",
      "description": "NumberMind is a real-time strategic number deduction game. Choose a secret 4-digit code with unique digits and outsmart your opponent by cracking theirs first. Features multiplayer PvP, AI practice mode, and global leaderboards.",
      "url": "https://numbermindgame.com/",
      "applicationCategory": "Game",
      "genre": ["Puzzle", "Logic", "Strategy", "Multiplayer"],
      "gamePlatform": "Web Browser",
      "operatingSystem": "HTML5",
      "numberOfPlayers": {
        "@type": "QuantitativeValue",
        "minValue": 1,
        "maxValue": 2
      },
      "publisher": {
        "@type": "Organization",
        "name": "NumberMind",
        "url": "https://numbermindgame.com/"
      },
      "author": {
        "@type": "Person",
        "name": "Dhruv Shah"
      },
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>

    <!-- ═══════════════════════════════════════════════════════════ -->
    <!-- STRUCTURED DATA – WebSite with SearchAction                 -->
    <!-- ═══════════════════════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "NumberMind",
      "url": "https://numbermindgame.com/",
      "description": "A real-time multiplayer code-breaking deduction game"
    }
    </script>

    <!-- ═══════════════════════════════════════════════════════════ -->
    <!-- STRUCTURED DATA – FAQPage (for FAQ rich results)           -->
    <!-- ═══════════════════════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is NumberMind?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "NumberMind is a free real-time multiplayer code-breaking deduction game. Two players each pick a secret 4-digit number with unique digits, then take turns guessing each other's code. Clues reveal how many digits are correct and how many are in the right position. The first player to crack their opponent's code wins."
          }
        },
        {
          "@type": "Question",
          "name": "How do you play the NumberMind code-breaking game?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Each player secretly selects a 4-digit number where all digits are unique (e.g. 1, 3, 7, 9). Players alternate making guesses. After each guess, you receive two clues: the number of correct digits (right digit, wrong position) and the number of exact matches (right digit, right position). Use logical deduction to narrow possibilities and crack the code before your opponent does."
          }
        },
        {
          "@type": "Question",
          "name": "Is NumberMind free to play?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! NumberMind is completely free to play with no credit card required. Simply sign up, create a username, and start playing immediately in your browser - no download needed."
          }
        },
        {
          "@type": "Question",
          "name": "What makes NumberMind different from Mastermind?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Unlike classic Mastermind which uses colored pegs against a computer, NumberMind is a live multiplayer deduction puzzle where you compete against real humans in real time. Both players guess simultaneously, creating tension and strategic depth that single-player code-breaking games cannot match."
          }
        },
        {
          "@type": "Question",
          "name": "What game modes does NumberMind offer?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "NumberMind offers three modes: Challenge Friends (private PvP invite), Random Matchmaking (instant global opponent), and Practice vs AI (adjustable difficulty training mode)."
          }
        }
      ]
    }
    </script>
